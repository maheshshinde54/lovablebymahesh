services:
  postgres:
    image: postgres:15
    container_name: lovable-db
    restart: always
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: Password@123
      POSTGRES_DB: lovable
      TZ: Asia/Kolkata
    # This command handles the "Asia/Calcutta" error at the source
    command: postgres -c timezone=Asia/Kolkata
    ports:
      - "9000:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: